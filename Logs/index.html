<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Operacao TIA</title>
    <style>
        :root {
            --bg: #eef2f7;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #475569;
            --brand: #0b4f74;
            --brand-2: #0ea5a8;
            --danger: #b91c1c;
            --success: #166534;
            --shadow: 0 10px 28px rgba(2, 6, 23, 0.09);
        }
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #f4f7fb 0%, var(--bg) 100%);
            color: var(--text);
            max-width: 1120px;
            margin: 0 auto;
            padding: 28px;
        }
        h1 {
            color: var(--brand);
            border-bottom: 2px solid var(--brand-2);
            padding-bottom: 8px;
            margin: 0;
        }
        .subtitle {
            color: var(--muted);
            margin: 8px 0 18px;
            font-size: 14px;
        }
        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
            margin-bottom: 18px;
        }
        .status {
            font-weight: 700;
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 9px;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: transform .08s ease, filter .18s ease;
        }
        button:hover { filter: brightness(0.98); transform: translateY(-1px); }
        .btn-export { background: #e3f2fd; color: #0d47a1; border-left: 5px solid #2196f3; }
        .btn-import { background: #e8f5e9; color: #1b5e20; border-left: 5px solid #4caf50; }
        .btn-cycle  { background: #fff3e0; color: #e65100; border-left: 5px solid #ff9800; }
        .btn-doc    { background: #ede7f6; color: #4527a0; border-left: 5px solid #673ab7; }
        .btn-map    { background: #e0f2f1; color: #004d40; border-left: 5px solid #009688; }
        .btn-dev    { background: #e0f2fe; color: #0c4a6e; border-left: 5px solid #0284c7; }
        #log-container {
            background: #0b1220;
            color: #22c55e;
            padding: 14px;
            border-radius: 8px;
            min-height: 220px;
            white-space: pre-wrap;
            overflow-y: auto;
            font-family: Consolas, monospace;
            border: 1px solid #111827;
        }
        .small-btn { width: auto; padding: 8px 12px; background: #e5e7eb; color: #111827; display: inline-block; }
        .modal { display: none; position: fixed; z-index: 999; inset: 0; background: rgba(0,0,0,.45); }
        .modal-content {
            background: #fff;
            width: min(1240px, 94vw);
            height: min(84vh, 920px);
            margin: 4vh auto;
            border-radius: 10px;
            padding: 14px;
            overflow: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .close { border: none; background: #efefef; border-radius: 6px; width: auto; padding: 6px 10px; }
        #mermaidContainer { min-height: 500px; border: 1px solid #eee; border-radius: 8px; padding: 10px; }
        .zoom-controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 5px; }
        .zoom-btn {
            width: 30px; height: 30px; border-radius: 50%; border: 1px solid #ccc;
            background: white; font-weight: bold; cursor: pointer; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #tia-map-link-container a {
            display:block; margin-top:10px; padding:12px; background:#0369a1; color:white;
            text-align:center; border-radius:8px; text-decoration:none; font-weight:600;
        }
        .health-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .health-item { background: #f1f5f9; padding: 10px; border-radius: 6px; text-align: center; font-size: 12px; border: 1px solid #cbd5e1; }
        .health-label { display: block; color: #64748b; margin-bottom: 4px; font-weight: 600; }
        .health-val { font-weight: bold; color: #0f172a; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
        .dot.ok { background-color: #22c55e; } .dot.nok { background-color: #ef4444; }
        .path-box { margin: 10px 0 14px; padding: 10px; border: 1px solid #dbe4ef; border-radius: 8px; background: #f8fafc; }
        .path-box label { display:block; font-size:12px; font-weight:700; color:#334155; margin-bottom:6px; }
        .path-row { display:flex; gap:8px; }
        .path-row input { flex:1; border:1px solid #cbd5e1; border-radius:8px; padding:9px 10px; font-size:13px; }
        .path-row .small-btn { margin:0; }
        .path-info { font-size:12px; color:#475569; margin-top:6px; white-space: pre-wrap; }
        @media (max-width: 860px) {
            .actions { grid-template-columns: 1fr; }
            body { padding: 14px; }
        }
    </style>
</head>
<body>
    <h1>Painel de Operacao TIA</h1>
    <p class="subtitle">Gestao de ciclo de vida e analise de software PLC (S7-1500).</p>

    <div class="card">
        <div class="health-grid">
            <div class="health-item">
                <span class="health-label">WEBSERVER</span>
                <span class="health-val"><span class="dot ok"></span>Online (8080)</span>
            </div>
            <div class="health-item">
                <span class="health-label">TIA MAP (API)</span>
                <span class="health-val">Porta 8001</span>
            </div>
            <div class="health-item">
                <span class="health-label">TIA MAP (UI)</span>
                <span class="health-val">Porta 5173</span>
            </div>
        </div>
        <div class="status" id="status-text">Sistema pronto.</div>
        <div class="path-box">
            <label for="tia-path-input">Caminho da pasta do projeto TIA</label>
            <div class="path-row">
                <input id="tia-path-input" type="text" placeholder="Ex.: C:\Projetos\MeuProjetoTIA" />
                <button class="small-btn" onclick="saveTiaPath()">Salvar</button>
            </div>
            <div id="tia-path-info" class="path-info">Caminho nao configurado.</div>
        </div>
        <div class="actions">
            <button class="btn-export" onclick="runScript('RunExporterWithAttach.ps1')">1. Exportar (Backup XML)</button>
            <button class="btn-import" onclick="runScript('Import-New-Blocks.ps1')">2. Importar (SCL/UDT)</button>
            <button class="btn-cycle" onclick="runScript('Run-Full-Cycle.ps1')">3. Ciclo DevOps (Full)</button>
            <button class="btn-doc" onclick="runScript('Generate-Documentation.ps1')">4. Documentacao (HTML)</button>
            <button class="btn-map" onclick="openStructureMap()">5. Mapa Estrutural</button>
            <button class="btn-map" onclick="openExecutionMap()">6. Fluxo de Execucao</button>
            <button class="btn-dev" onclick="runScript('Run-TiaMap-Dev.ps1')">7. TIA Map (App)</button>
        </div>
        <div id="tia-map-link-container"></div>
    </div>

    <div class="card">
        <h3>Monitor de logs (ultima execucao)</h3>
        <div id="log-container">Aguardando logs...</div>
        <button class="small-btn" onclick="fetchLogs()">Atualizar logs</button>
    </div>

    <div id="structureModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Mapa Mermaid</h3>
                <button class="close" onclick="closeStructureMap()">Fechar</button>
            </div>
            <div style="position: relative; height: 100%; overflow: hidden;">
                <div id="mermaidContainer" style="height: 100%; border: none;">Carregando diagrama...</div>
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomIn()">+</button>
                    <button class="zoom-btn" onclick="zoomOut()">-</button>
                    <button class="zoom-btn" onclick="resetZoom()">R</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <script>
        if (window.mermaid) {
            mermaid.initialize({ startOnLoad: false, securityLevel: 'loose' });
        }

        async function parseJsonSafe(response) {
            const raw = await response.text();
            try {
                return JSON.parse(raw);
            } catch (e) {
                throw new Error(`Resposta invalida do servidor (${response.status}): ${raw.slice(0, 240)}`);
            }
        }

        function setStatus(message, type = 'info') {
            const status = document.getElementById('status-text');
            status.innerText = message;
            if (type === 'error') status.style.color = '#b91c1c';
            else if (type === 'success') status.style.color = '#166534';
            else status.style.color = '#0b4f74';
        }

        async function runScript(scriptName) {
            setStatus(`Status: solicitando execucao de ${scriptName}...`, 'info');
            try {
                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ script: scriptName })
                });

                const result = await parseJsonSafe(response);
                if (result.status === 'success') {
                    setStatus(`Status: ${scriptName} iniciado com sucesso.`, 'success');
                    if (scriptName === 'Run-TiaMap-Dev.ps1') {
                        const linkDiv = document.getElementById('tia-map-link-container');
                        linkDiv.innerHTML = '<a href="http://localhost:5173" target="_blank">Abrir TIA Map (http://localhost:5173)</a>';
                    }
                    setTimeout(fetchLogs, 1200);
                } else {
                    let errorMsg = `Erro: ${result.message || 'Falha nao informada.'}`;
                    if (result.script) errorMsg += `\nScript: ${result.script}`;
                    if (result.searched) errorMsg += `\nLocais pesquisados: ${result.searched}`;
                    setStatus(errorMsg, 'error');
                }
            } catch (error) {
                setStatus(`Erro de conexao: ${error}`, 'error');
            }
        }

        async function loadTiaPath() {
            try {
                const response = await fetch('/api/project-path');
                const data = await parseJsonSafe(response);
                const input = document.getElementById('tia-path-input');
                const info = document.getElementById('tia-path-info');
                input.value = data.tiaPath || '';
                info.innerText = `Origem: ${data.resolvedExportPath || '-'} | XMLs: ${data.xmlCount ?? 0}`;
            } catch (error) {
                document.getElementById('tia-path-info').innerText = `Falha ao carregar caminho: ${error}`;
            }
        }

        async function saveTiaPath() {
            const input = document.getElementById('tia-path-input');
            const pathValue = (input.value || '').trim();
            if (!pathValue) {
                setStatus('Informe um caminho de pasta TIA antes de salvar.', 'error');
                return;
            }
            try {
                const response = await fetch('/api/project-path', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: pathValue })
                });
                const data = await parseJsonSafe(response);
                if (data.status === 'success') {
                    setStatus('Caminho TIA salvo com sucesso.', 'success');
                    document.getElementById('tia-path-info').innerText = `Origem: ${data.resolvedExportPath || '-'} | XMLs: ${data.xmlCount ?? 0}`;
                } else {
                    setStatus(`Erro ao salvar caminho: ${data.message || 'falha desconhecida'}`, 'error');
                }
            } catch (error) {
                setStatus(`Erro de conexao ao salvar caminho: ${error}`, 'error');
            }
        }

        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const data = await parseJsonSafe(response);
                let logText = data.log;
                if (typeof logText === 'object' && logText !== null) {
                    logText = logText.value || JSON.stringify(logText, null, 2);
                }
                document.getElementById('log-container').innerText = logText || 'Nenhum log disponivel.';
            } catch (error) {
                document.getElementById('log-container').innerText = `Erro ao buscar logs: ${error}`;
            }
        }

        let panZoomInstance = null;

        async function renderMermaidFromEndpoint(endpoint, titleText, fallback) {
            const modal = document.getElementById('structureModal');
            const container = document.getElementById('mermaidContainer');
            const title = document.getElementById('modalTitle');
            title.innerText = titleText;
            modal.style.display = 'block';
            container.innerText = 'Carregando diagrama...';

            try {
                const response = await fetch(endpoint);
                const data = await parseJsonSafe(response);
                const definition = data.diagram || fallback;

                if (!window.mermaid) {
                    container.innerText = definition;
                    return;
                }

                const id = 'm' + Date.now();
                const render = await mermaid.render(id, definition);
                container.innerHTML = render.svg;

                const svgElement = container.querySelector('svg');
                if (svgElement) {
                    svgElement.style.height = '100%';
                    svgElement.style.width = '100%';
                    panZoomInstance = svgPanZoom(svgElement, {
                        zoomEnabled: true,
                        controlIconsEnabled: false,
                        fit: true,
                        center: true,
                        minZoom: 0.1,
                        maxZoom: 10
                    });
                }
            } catch (error) {
                container.innerText = `Erro ao gerar diagrama: ${error}`;
            }
        }

        async function openStructureMap() {
            return renderMermaidFromEndpoint('/api/mermaid', 'Mapa de Estrutura de Pastas', 'graph TD\nA[Sem dados de estrutura]');
        }

        async function openExecutionMap() {
            return renderMermaidFromEndpoint('/api/execution-mermaid', 'Mapa de Sequencia de Execucao PLC', 'graph TD\nA[Sem dados de execucao]');
        }

        function zoomIn() { if (panZoomInstance) panZoomInstance.zoomIn(); }
        function zoomOut() { if (panZoomInstance) panZoomInstance.zoomOut(); }
        function resetZoom() { if (panZoomInstance) panZoomInstance.resetZoom(); }

        function closeStructureMap() {
            document.getElementById('structureModal').style.display = 'none';
            if (panZoomInstance) {
                panZoomInstance.destroy();
                panZoomInstance = null;
            }
        }

        window.onclick = function(event) {
            const modal = document.getElementById('structureModal');
            if (event.target === modal) {
                closeStructureMap();
            }
        };

        loadTiaPath();
        fetchLogs();
    </script>
</body>
</html>
