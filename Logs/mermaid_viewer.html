<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualizador de Diagramas</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-border: rgba(148, 163, 184, 0.25);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #0ea5e9;
      --danger: #ef4444;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(1200px 900px at 20% 10%, rgba(14,165,233,0.16), transparent 60%),
                  radial-gradient(1000px 800px at 80% 20%, rgba(99,102,241,0.12), transparent 55%),
                  var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: rgba(2, 6, 23, 0.74);
      border-bottom: 1px solid rgba(148, 163, 184, 0.15);
      backdrop-filter: blur(10px);
      z-index: 5;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .title strong {
      font-size: 14px;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title span {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
      transition: transform 0.12s ease, border-color 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(14, 165, 233, 0.55);
    }

    .btn-primary {
      border-color: rgba(14, 165, 233, 0.55);
      background: rgba(14, 165, 233, 0.16);
    }

    main {
      position: absolute;
      inset: 52px 0 0 0;
    }

    #canvas {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    #canvas .placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 13px;
      padding: 20px;
      text-align: center;
    }

    #canvas svg {
      width: 100%;
      height: 100%;
    }

    /* Toolbar vertical no padrao solicitado ( + / - / ajustar / travar ) */
    .toolbar {
      position: fixed;
      left: 14px;
      bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      z-index: 6;
    }

    .tool-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .tool-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(14, 165, 233, 0.55);
    }

    .tool-btn.active {
      border-color: rgba(14, 165, 233, 0.75);
      background: rgba(14, 165, 233, 0.18);
    }

    .tool-sep {
      height: 1px;
      background: rgba(148, 163, 184, 0.22);
      margin: 2px 2px;
    }

    .error {
      color: #fecaca;
      background: rgba(239, 68, 68, 0.14);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: 12px;
      padding: 12px 14px;
      max-width: 900px;
      white-space: pre-wrap;
      font-family: Consolas, Menlo, monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <div class="title">
      <strong id="page-title">Visualizador de Diagramas</strong>
      <span id="page-subtitle">Carregando...</span>
    </div>
    <div class="header-actions">
      <button class="btn" type="button" id="btn-recarregar">Recarregar</button>
      <button class="btn btn-primary" type="button" id="btn-voltar">Voltar ao Painel</button>
    </div>
  </header>

  <main>
    <div id="canvas">
      <div class="placeholder" id="placeholder">Carregando diagrama...</div>
    </div>
  </main>

  <div class="toolbar" aria-label="Ferramentas de zoom e navegacao">
    <button class="tool-btn" id="tool-zoom-in" type="button" title="Aumentar zoom">+</button>
    <button class="tool-btn" id="tool-zoom-out" type="button" title="Diminuir zoom">−</button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="tool-fit" type="button" title="Ajustar ao quadro">⤢</button>
    <button class="tool-btn" id="tool-center" type="button" title="Centralizar">⌖</button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="tool-lock" type="button" title="Travar/destravar pan e zoom">🔒</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom/dist/svg-pan-zoom.min.js"></script>
  <script>
    // Mantem configuracao compatível com diagramas grandes.
    mermaid.initialize({ startOnLoad: false, securityLevel: "loose", maxTextSize: 5000000, maxEdges: 5000 });

    const canvas = document.getElementById("canvas");
    const placeholder = document.getElementById("placeholder");
    const pageTitle = document.getElementById("page-title");
    const pageSubtitle = document.getElementById("page-subtitle");

    const btnRecarregar = document.getElementById("btn-recarregar");
    const btnVoltar = document.getElementById("btn-voltar");

    const toolZoomIn = document.getElementById("tool-zoom-in");
    const toolZoomOut = document.getElementById("tool-zoom-out");
    const toolFit = document.getElementById("tool-fit");
    const toolCenter = document.getElementById("tool-center");
    const toolLock = document.getElementById("tool-lock");

    let panZoom = null;
    let locked = false;

    function parseMode() {
      const params = new URLSearchParams(window.location.search);
      const mode = (params.get("mode") || "structure").toLowerCase();
      if (mode === "execution") return "execution";
      return "structure";
    }

    function endpointForMode(mode) {
      // Estrutura e fluxo de execucao compartilham o mesmo viewer.
      if (mode === "execution") return "/api/execution-mermaid";
      return "/api/mermaid";
    }

    function titleForMode(mode) {
      return mode === "execution" ? "Fluxo de execucao" : "Mapa estrutural";
    }

    async function parseJsonSafe(response) {
      const raw = await response.text();
      try {
        return JSON.parse(raw);
      } catch (err) {
        throw new Error("Resposta invalida do servidor: " + raw.slice(0, 240));
      }
    }

    function destroyPanZoom() {
      if (panZoom) {
        try { panZoom.destroy(); } catch (e) {}
        panZoom = null;
      }
    }

    function setLocked(nextLocked) {
      locked = nextLocked;
      toolLock.classList.toggle("active", locked);
      toolLock.textContent = locked ? "🔓" : "🔒";
      toolLock.title = locked ? "Destravar pan e zoom" : "Travar pan e zoom";
      if (panZoom) {
        // API do svg-pan-zoom: enable/disable (nao existe setZoomEnabled).
        if (locked) {
          if (panZoom.disableZoom) panZoom.disableZoom();
          if (panZoom.disablePan) panZoom.disablePan();
        } else {
          if (panZoom.enableZoom) panZoom.enableZoom();
          if (panZoom.enablePan) panZoom.enablePan();
        }
      }
    }

    function showError(message) {
      destroyPanZoom();
      canvas.innerHTML = "<div class='placeholder'></div>";
      const holder = canvas.querySelector(".placeholder");
      holder.innerHTML = "<div class='error'></div>";
      holder.querySelector(".error").textContent = message;
      pageSubtitle.textContent = "Erro ao gerar diagrama";
    }

    async function loadDiagram() {
      const mode = parseMode();
      const endpoint = endpointForMode(mode);

      pageTitle.textContent = titleForMode(mode);
      pageSubtitle.textContent = endpoint;

      destroyPanZoom();
      canvas.innerHTML = "<div class='placeholder' id='placeholder'>Carregando diagrama...</div>";

      try {
        const response = await fetch(endpoint);
        if (!response.ok) {
          throw new Error("Servidor retornou " + response.status);
        }
        const data = await parseJsonSafe(response);
        const definition = data.diagram || "graph TD\\n  A[\"Diagrama nao pode ser gerado\"]";

        const renderId = "mermaid-" + Date.now();
        const rendered = await mermaid.render(renderId, definition);
        canvas.innerHTML = rendered.svg;

        const svgElement = canvas.querySelector("svg");
        if (!svgElement) {
          throw new Error("SVG nao foi gerado pelo Mermaid.");
        }

        // Ativa zoom e pan com limites amplos para projetos grandes.
        panZoom = svgPanZoom(svgElement, {
          zoomEnabled: true,
          panEnabled: true,
          controlIconsEnabled: false,
          fit: true,
          center: true,
          minZoom: 0.01,
          maxZoom: 100
        });

        setLocked(false);
        pageSubtitle.textContent = "Use scroll para zoom e arraste para mover. Projetos grandes podem levar alguns segundos.";
      } catch (err) {
        showError(String(err && err.message ? err.message : err));
      }
    }

    // Acoes da toolbar.
    toolZoomIn.addEventListener("click", () => panZoom && panZoom.zoomIn());
    toolZoomOut.addEventListener("click", () => panZoom && panZoom.zoomOut());
    toolFit.addEventListener("click", () => panZoom && panZoom.fit());
    toolCenter.addEventListener("click", () => panZoom && panZoom.center());
    toolLock.addEventListener("click", () => setLocked(!locked));

    // Acoes do header.
    btnRecarregar.addEventListener("click", () => loadDiagram());
    btnVoltar.addEventListener("click", () => {
      // Volta para o painel (mesma origem/porta).
      window.location.href = "/";
    });

    // Atalho: tecla R recarrega o diagrama.
    document.addEventListener("keydown", (ev) => {
      if (ev.key === "r" || ev.key === "R") {
        loadDiagram();
      }
    });

    loadDiagram();
  </script>
</body>
</html>
